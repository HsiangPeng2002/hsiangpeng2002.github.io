<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的個人網站</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* ===== Navbar ===== */
nav {
    background: #222;
    color: white;
    display: flex;
    justify-content: space-between;
    padding: 12px 20px;
    align-items: center;
}

nav .logo {
    font-weight: bold;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
    margin: 0;
}

nav a {
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

nav a:hover {
    color: #00c3ff;
}

/* ===== Layout ===== */
.container {
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    gap: 20px;
    padding: 20px;
}

.column {
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

/* ===== Card UI ===== */
.card {
    background: #fff;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 12px;
    transition: all 0.3s ease;
    border: 1px solid #eee;
}

/* hover 小動畫 */
.card:hover {
    transform: translateY(-5px) scale(1.01);
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

/* repo 按鈕 */
.repo-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 6px 12px;
    background: #222;
    color: white;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

.repo-btn:hover {
    background: #00c3ff;
}

/* ===== Footer ===== */
footer {
    text-align: center;
    padding: 15px;
    background: #222;
    color: white;
}

/* ===== RWD ===== */
@media (max-width: 768px) {
    .container {
        grid-template-columns: 1fr;
    }

    nav ul {
        display: none; /* 簡化手機版 */
    }
}
</style>
</head>

<body>

<!-- Navbar -->
<nav>
    <div class="logo">My Portfolio</div>
    <ul>
        <li><a href="#">首頁</a></li>
        <li><a href="#">作品</a></li>
        <li><a href="#">聯絡</a></li>
    </ul>
</nav>

<!-- 三欄 -->
<div class="container">

    <!-- 左欄 -->
    <div class="column">
        <h2>關於我</h2>
        <p>這裡寫你的簡介</p>

        <h3>技能</h3>
        <ul>
            <li>HTML / CSS</li>
            <li>PHP</li>
            <li>JavaScript</li>
        </ul>
    </div>

    <!-- 中間（主內容） -->
    <div class="column">

        <h2>作品集</h2>

        <!-- 專案卡片 1 -->
        <div class="card">
            <h3>專案名稱 1</h3>
            <p>這裡放專案簡介，例如做了什麼、用什麼技術。</p>

            <!-- repo 預留 -->
            <a href="#" class="repo-btn">View Repo</a>
        </div>

        <!-- 專案卡片 2 -->
        <div class="card">
            <h3>專案名稱 2</h3>
            <p>可以放區塊鏈 / 系統 / 網站專案</p>

            <a href="#" class="repo-btn">View Repo</a>
        </div>

        <!-- 專案卡片 3 -->
        <div class="card">
            <h3>專案名稱 3</h3>
            <p>之後新增直接複製這個 card 就好</p>

            <a href="#" class="repo-btn">View Repo</a>
        </div>

    </div>

    <!-- 右欄 -->
    <div class="column">
        <h2>聯絡我</h2>
        <p>Email: your@email.com</p>

        <h3>連結</h3>
        <ul>
            <li><a href="#">GitHub</a></li>
            <li><a href="#">LinkedIn</a></li>
        </ul>
    </div>

</div>

<footer>
    <p>© 2026 Your Name</p>
</footer>

</body>
</html>
