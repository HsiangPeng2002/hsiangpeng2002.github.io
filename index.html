<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的個人網站</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* ===== Navbar ===== */
nav {
    background: #222;
    color: white;
    display: flex;
    justify-content: space-between;
    padding: 12px 20px;
    align-items: center;
}

nav .logo {
    font-weight: bold;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 20px;
    margin: 0;
}

nav a {
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

nav a:hover {
    color: #00c3ff;
}

/* ===== Layout ===== */
.container {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 20px;
    padding: 20px;
}

/* ===== Sidebar ===== */
.sidebar {
    background: white;
    padding: 20px;
    border-radius: 12px;
    height: fit-content;
    box-shadow: 0 3px 8px rgba(0,0,0,0.08);
}

/* ===== Main Content ===== */
.main {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

/* ===== Card ===== */
.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    transition: 0.3s;
    border: 1px solid #eee;
}

/* hover 動畫 */
.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* repo 按鈕 */
.repo-btn {
    display: inline-block;
    margin-top: 10px;
    padding: 6px 12px;
    background: #222;
    color: white;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

.repo-btn:hover {
    background: #00c3ff;
}

/* ===== Footer ===== */
footer {
    text-align: center;
    padding: 15px;
    background: #222;
    color: white;
    margin-top: 20px;
}

/* ===== RWD ===== */
@media (max-width: 768px) {
    .container {
        grid-template-columns: 1fr;
    }

    nav ul {
        display: none;
    }
}
</style>
</head>

<body>

<!-- Navbar -->
<nav>
    <div class="logo">My Portfolio</div>
    <ul>
        <li><a href="#">首頁</a></li>
        <li><a href="#">作品</a></li>
        <li><a href="#">聯絡</a></li>
    </ul>
</nav>

<div class="container">

    <!-- 左側欄 -->
    <div class="sidebar">
        <h2>關於我</h2>
        <p>這裡寫你的簡介</p>

        <h3>技能</h3>
        <ul>
            <li>HTML / CSS</li>
            <li>PHP</li>
            <li>JavaScript</li>
        </ul>

        <h3>聯絡</h3>
        <p>Email: your@email.com</p>
    </div>

    <!-- 右側主內容 -->
    <div class="main">

        <!-- 卡片 1 -->
        <div class="card">
            <h3>專案名稱 1</h3>
            <p>簡單描述你的專案</p>
            <a href="#" class="repo-btn">View Repo</a>
        </div>

        <!-- 卡片 2 -->
        <div class="card">
            <h3>專案名稱 2</h3>
            <p>例如你的區塊鏈改寫專案</p>
            <a href="#" class="repo-btn">View Repo</a>
        </div>

        <!-- 卡片 3 -->
        <div class="card">
            <h3>專案名稱 3</h3>
            <p>之後直接複製這塊就能新增</p>
            <a href="#" class="repo-btn">View Repo</a>
        </div>

    </div>

</div>

<footer>
    <p>© 2026 Your Name</p>
</footer>

</body>
</html>
